<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <!-- TT Icon -->
  <!-- Left T -->
  <rect x="8" y="10" width="52" height="10" rx="2" fill="#3A3A4A"/>
  <rect x="28" y="10" width="10" height="50" rx="2" fill="#3A3A4A"/>
  <!-- Right T (overlapping) -->
  <rect x="38" y="10" width="52" height="10" rx="2" fill="#3A3A4A"/>
  <rect x="58" y="10" width="10" height="50" rx="2" fill="#3A3A4A"/>
  <!-- Blue dot -->
  <circle cx="48" cy="65" r="10" fill="#2563EB"/>
  <!-- Ripple arcs -->
  <path d="M18 82 Q48 105 78 82" stroke="#2563EB" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M8 95 Q48 125 88 95" stroke="#2563EB" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Text: "The" in dark gray -->
  <text x="110" y="72" font-family="'Instrument Serif', Georgia, serif" font-size="42" font-weight="700" font-style="italic" fill="#3A3A4A">The</text>
  <!-- Text: "TapTempo" in blue -->
  <text x="195" y="72" font-family="'Instrument Serif', Georgia, serif" font-size="42" font-weight="700" font-style="italic" fill="#2563EB">TapTempo</text>
</svg>
